# config/config.yml
# -------------------------------------------------------
# Central configuration for the GROWELL lipidomics pipeline
# Edit paths and parameters here — never in the R scripts
#
# Pipeline execution order:
#   00_load_packages.R          — package loading (sourced by all scripts)
#   00_figure_theme.R           — figure standards (sourced by plotting scripts)
#   01_prepare_raw_data.R       — parse core facility Excel, split by timepoint
#   02_prepare_traits.R         — clean GROWELL trait/phenotype data
#   03_normalize_lipids.R       — MetaboAnalystR normalization
#   04_prepare_lipids.R         — build multiExpr object for WGCNA
#   05_run_consensus_wgcna.R    — soft power selection + consensus WLCNA
#   06_module_membership.R      — kME scores, hub lipid identification
#   07_annotate_lipids.R        — RefMet/PubChem annotation + module class order
#   08_module_trait_correlations.R — Spearman/Pearson module-trait correlations
#   09_module_eigennode_plots.R — eigennode boxplots per module × trait
#   10_differential_lipids.R   — Wilcoxon tests APO/PPWR, volcano plots
#   11_lipid_boxplots.R        — boxplots for selected lipids of interest
#   12_plsda.R                 — PLS-DA permutation testing
#   13_sensitivity_analyses.R  — sensitivity checks
#   99_assemble_figures.R      — combine panels into final figures
# -------------------------------------------------------

# ── Data paths ───────────────────────────────────────────
data:
  traits:        "data/raw/growell_curated_deid_george.csv"
  lipid_excel:   "data/raw/mx_769102_LaSalle_lipidomics_human_dried_blood_spots_12-2023_submit.xlsx"
  timepoint_map: "data/raw/Seed_Sample_Metabolomics_Subaliquots.xlsx"

  lipids_raw:
    baseline:   "data/raw/lipids_raw/identified_lipids_baseline_raw.csv"
    wk36:       "data/raw/lipids_raw/identified_lipids_TP36_raw.csv"
    postpartum: "data/raw/lipids_raw/identified_lipids_postpartum_raw.csv"

  lipids:
    baseline:   "data/raw/lipids_normalized/identified_lipids_baseline_data_normalized.csv"
    wk36:       "data/raw/lipids_normalized/identified_lipids_TP36_data_normalized.csv"
    postpartum: "data/raw/lipids_normalized/identified_lipids_postpartum_data_normalized.csv"

  pubchem:                     "data/raw/Lipid_PubChem_CID_InCHIKey.csv"
  refmet:                      "data/raw/Ref_Met_Results.csv"
  lipid_annotations_corrected: "data/raw/Lipid_annotations_module_corrected.csv"

# ── Output folders (one per script) ──────────────────────
output:
  processed: "data/processed"

  s01:  "results/01_raw_data"               # 01_prepare_raw_data.R
  s02:  "results/02_traits"                 # 02_prepare_traits.R
  s03:  "results/03_normalization"          # 03_normalize_lipids.R
  s04:  "results/04_lipids"                 # 04_prepare_lipids.R
  s05:  "results/05_consensus_wgcna"        # 05_run_consensus_wgcna.R
  s06:  "results/06_module_membership"      # 06_module_membership.R
  s07:  "results/07_annotations"            # 07_annotate_lipids.R
  s08:  "results/08_module_trait_cor"       # 08_module_trait_correlations.R
  s09:  "results/09_module_eigennode_plots" # 09_module_eigennode_plots.R
  s10:  "results/10_differential"           # 10_differential_lipids.R
  s11:  "results/11_lipid_boxplots"         # 11_lipid_boxplots.R
  s12:  "results/12_plsda"                  # 12_plsda.R
  s13:  "results/13_sensitivity"            # 13_sensitivity_analyses.R

# ── Normalization settings ────────────────────────────────
normalization:
  run_from_raw:     true
  method_sample:    "median"      # MetaboAnalystR: MedianNorm
  method_transform: "log10"       # MetaboAnalystR: LogNorm
  method_scaling:   "pareto"      # MetaboAnalystR: ParetoNorm

# ── WGCNA parameters ─────────────────────────────────────
wgcna:
  soft_power:       14
  network_type:     "signed"
  cor_type:         "bicor"
  max_block_size:   3000
  deep_split:       4
  min_module_size:  5
  merge_cut_height: 0.10
  max_p_outliers:   0.10
  timepoint_labels:
    - "10-16 weeks"
    - "36-38 weeks"
    - "Postpartum"

# ── Module-trait correlation ──────────────────────────────
# ┌─────────────────────────────────────────────────────────┐
# │  TO SWITCH BETWEEN RAW AND FDR — edit these 3 lines:   │
# │                                                         │
# │  RAW p-values:                                          │
# │    heatmap_significance: "raw"                          │
# │    figure2_heatmap_mode: "raw"                          │
# │    figure2_heatmap_subdir: "heatmaps_raw_p005"          │
# │                                                         │
# │  FDR (BH corrected):                                    │
# │    heatmap_significance: "fdr"                          │
# │    figure2_heatmap_mode: "fdr"                          │
# │    figure2_heatmap_subdir: "heatmaps_family_BH_q010"   │
# └─────────────────────────────────────────────────────────┘
module_trait:
  method: "spearman"

  heatmap_significance: "raw"               # ← "raw" or "fdr"
  figure2_heatmap_mode: "raw"               # ← "raw" or "fdr"
  figure2_heatmap_subdir: "heatmaps_raw_p005" # heatmaps_raw_p005"  # ← matches above

  raw_p_cutoff: 0.05
  fdr_cutoff:   0.10
  fdr_method:   "BH"
  fdr_scope:    "family"

#   # Figure 2 trait set: "primary" = APO+PPWR only; "all" = all traits
#   figure2_trait_set: "primary"

  figure2_trait_set: "primary"

  primary_figure2_traits:
    - "apo"
    - "preterm"
    - "apo_hdp"
    - "apo_gdm"
    - "apo_other"
    - "ppwr_e"
    - "ppwr"
    - "weight_base"
    - "weight_wk26"
    - "weight_wk36"
    - "weight_mth3"
    - "weight_mth6"
    - "bmi_base"
    - "bmi_wk26"
    - "bmi_wk36"
    - "bmi_mth3"
    - "bmi_mth6"
    - "gwg"
    - "egwg"    
    - "age"
    - "race_white"
    - "group"
  fdr_families:
    Primary_APO:
      - "apo"
      - "apo_hdp"
      - "apo_gdm"
      - "apo_other"
      - "apo_other"
      - "preterm"
    Primary_PPWR:
      - "ppwr_e"
      - "ppwr"
    Secondary_weight_anthropometry:
      - "weight_base"
      - "weight_wk26"
      - "weight_wk36"
      - "weight_mth3"
      - "weight_mth6"
      - "bmi"
      - "bmi_base"
      - "bmi_wk26"
      - "bmi_wk36"
      - "bmi_mth3"
      - "bmi_mth6"
      - "gwg"
      - "egwg"
      - "age"
      - "bmi"
      - "race_white"
      - "group"


# ── Module filter for Figure 2 (main manuscript) ──────────
  # Controls which modules appear in the main figure heatmap.
  # All modules always appear in the supplementary heatmap.
  #
  # figure2_module_filter options:
  #   "nominal"  → keep modules with at least one trait p < raw_p_cutoff
  #                in ANY of the three timepoints          [current choice]
  #   "fdr"      → keep modules with at least one trait q < fdr_cutoff
  #                in ANY of the three timepoints          [stricter]
  #   "none"     → show all modules (no filter)
  #
  # To switch to FDR filtering: change "nominal" → "fdr"
  figure2_module_filter:        "nominal"   # ← "nominal", "fdr", or "none"
  figure2_module_filter_cutoff_nominal: 0.05
  figure2_module_filter_cutoff_fdr:     0.10
  
# ── Differential lipid analysis ──────────────────────────
# apply_fdr: true  → BH correction, threshold = fdr_cutoff
# apply_fdr: false → raw p-values,  threshold = raw_p_cutoff
differential:
  outcomes:
    - "apo"
    - "ppwr_e"
  test:          "wilcoxon"
  apply_fdr:     false          # ← true or false
  fdr_method:    "BH"
  fdr_cutoff:    0.1
  raw_p_cutoff:  0.05
  top_n_labels:  10

# ── Covariates (for sensitivity analyses) ─────────────────
covariates:
  - "age"
  - "bmi"
  - "race_eth_new"
  - "group"

# ── FDR (global fallback) ─────────────────────────────────
fdr:
  alpha:  0.05
  method: "BH"

# ── PLS-DA ───────────────────────────────────────────────

plsda:

  # Components to request from ropls
  ncomp: 2 # request up to 5; ropls will stop earlier if Q2 drops

  # Outcomes to run — must match column names in lipid_status_labels.rds
  # Comment out or set to [] to run ALL available outcomes
  outcomes:
    - ppwr_status
    - apo_status
    # - egwg_status     # uncomment to add back

  # ropls-specific parameters
  crossI:  7      # cross-validation folds (7 is ropls default; matches MetaboAnalyst)
  permI:   999    # permutation iterations for pR2Y / pQ2

  # Biplot: number of top-VIP loadings to display as arrows
  n_top_loadings: 10

  # Optional: custom group colours keyed to factor levels in status_labels
  # If omitted, a built-in palette is used automatically.
  # Keys must exactly match the level strings in your outcome columns.
  # group_colours:
  #   PPWR_NO:  "#4DAFCA"
  #   PPWR_YES: "#E94D36"
  #   APO_NO:   "#4DAF4A"
  #   APO_YES:  "#E94D36"

  # Legacy mixOmics parameters — kept for reference, no longer used
  # folds:      5
  # nrepeat:    100
  # validation: "Mfold"
